name: CI/CD Full Stack
on: [push]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --prefix backend && npm run lint --prefix backend && npm test --prefix backend
      - run: npm ci --prefix frontend && npm run lint --prefix frontend && npm test --prefix frontend

  build-push:
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO=${REPO}"
          docker build -t ghcr.io/${REPO}/backend:latest ./backend
          docker build -t ghcr.io/${REPO}/frontend:latest ./frontend
          docker push ghcr.io/${REPO}/backend:latest
          docker push ghcr.io/${REPO}/frontend:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}

      - name: Rollback on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.RENDER_ROLLBACK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
