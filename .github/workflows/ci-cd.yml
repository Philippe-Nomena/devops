name: CI/CD Full Stack
on: [push]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --prefix backend && npm run lint --prefix backend && npm test --prefix backend
      - run: npm ci --prefix frontend && npm run lint --prefix frontend && npm test --prefix frontend

  build-push:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REPO=${REPO}"
          docker build -t ghcr.io/${REPO}/backend:latest ./backend
          docker build -t ghcr.io/${REPO}/frontend:latest ./frontend
          docker push ghcr.io/${REPO}/backend:latest
          docker push ghcr.io/${REPO}/frontend:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render (Blue/Green)
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          echo "Déploiement automatique sur Render (Blue/Green)..."
          curl -X POST "$RENDER_DEPLOY_HOOK_BACKEND" --fail --silent
          curl -X POST "$RENDER_DEPLOY_HOOK_FRONTEND" --fail --silent
          echo "Déploiement lancé avec succès"

      - name: Rollback on failure
        if: failure()
        env:
          RENDER_ROLLBACK_URL: ${{ secrets.RENDER_ROLLBACK_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Rollback déclenché suite à un échec..."
          if [ -n "$RENDER_ROLLBACK_URL" ]; then
            curl -X POST "$RENDER_ROLLBACK_URL" \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                --fail --silent
            echo "Rollback exécuté"
          else
            echo "Aucun RENDER_ROLLBACK_URL configuré → rollback manuel nécessaire"
          fi
